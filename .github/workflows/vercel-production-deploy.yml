name: Vercel Production Deploy Bridge

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - 'vercel.json'
      - '.github/workflows/vercel-production-deploy.yml'

permissions:
  contents: read
  issues: write

jobs:
  deploy:
    name: Build and deploy latest main to Vercel production
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID || vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID || vars.VERCEL_PROJECT_ID }}
      VERCEL_PROTECTION_BYPASS: ${{ secrets.VERCEL_PROTECTION_BYPASS }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Vercel deploy configuration
        id: config
        shell: bash
        run: |
          set -euo pipefail
          MISSING=()
          [ -n "${VERCEL_TOKEN:-}" ] || MISSING+=("VERCEL_TOKEN")
          [ -n "${VERCEL_ORG_ID:-}" ] || MISSING+=("VERCEL_ORG_ID")
          [ -n "${VERCEL_PROJECT_ID:-}" ] || MISSING+=("VERCEL_PROJECT_ID")

          if [ "${#MISSING[@]}" -gt 0 ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            printf 'Missing required Vercel GitHub secret/variable: %s\n' "${MISSING[@]}"
            exit 1
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"
          if [ -n "${VERCEL_PROTECTION_BYPASS:-}" ]; then
            echo "protection_bypass=present" >> "$GITHUB_OUTPUT"
            echo "Vercel protection bypass is present and will be used for route validation."
          else
            echo "protection_bypass=absent" >> "$GITHUB_OUTPUT"
            echo "Vercel protection bypass is absent; validation will try public routes."
          fi
          echo "Vercel deployment secrets/variables are present. Values are masked by GitHub."

      - name: Set up Node
        if: steps.config.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.config.outputs.configured == 'true'
        run: npm ci

      - name: Install Vercel CLI
        if: steps.config.outputs.configured == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel production environment
        if: steps.config.outputs.configured == 'true'
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build with Vercel
        if: steps.config.outputs.configured == 'true'
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt output to production
        if: steps.config.outputs.configured == 'true'
        id: deploy
        shell: bash
        run: |
          set -euo pipefail
          URL=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "deployment_url=$URL" >> "$GITHUB_OUTPUT"
          echo "$URL" > vercel-deployment-url.txt
          echo "Deployment URL: $URL"

      - name: Validate deployment API routes
        if: steps.config.outputs.configured == 'true'
        shell: bash
        run: |
          set -euo pipefail
          URL="${{ steps.deploy.outputs.deployment_url }}"
          CURL_HEADERS=()
          if [ -n "${VERCEL_PROTECTION_BYPASS:-}" ]; then
            CURL_HEADERS=(-H "x-vercel-protection-bypass: ${VERCEL_PROTECTION_BYPASS}")
          fi
          curl -fsS "${CURL_HEADERS[@]}" "$URL/api/health" | tee health.json
          curl -fsS "${CURL_HEADERS[@]}" "$URL/api/sandbox/skill-drill-coach" | tee skill-drill.json
          grep -q 'system_slug' skill-drill.json

      - name: Create success issue
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.deployment_url }}';
            const bypass = '${{ steps.config.outputs.protection_bypass }}';
            const body = [
              '# Vercel Production Deploy Bridge Succeeded',
              '',
              `Deployment URL: ${url}`,
              `Commit: ${context.sha}`,
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `Protection bypass used: ${bypass === 'present' ? 'yes' : 'no'}`,
              '',
              'Validated routes:',
              '',
              `- ${url}/api/health`,
              `- ${url}/api/sandbox/skill-drill-coach`,
              '',
              'Next: run Skill Drill Coach validation against the production proof domain.',
              '',
              'No secret values are included.'
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Vercel production deploy bridge succeeded',
              body,
              labels: ['ai-in-action', 'vercel', 'deployment', 'success']
            });

      - name: Create failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '# Vercel Production Deploy Bridge Failed',
              '',
              `Commit: ${context.sha}`,
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Likely causes:',
              '',
              '- `VERCEL_TOKEN` is missing or invalid.',
              '- `VERCEL_ORG_ID` is missing as a GitHub secret or variable.',
              '- `VERCEL_PROJECT_ID` is missing as a GitHub secret or variable.',
              '- Vercel CLI could not pull project settings.',
              '- Build failed.',
              '- Deployed API routes did not return expected JSON.',
              '- Deployment protection is enabled and `VERCEL_PROTECTION_BYPASS` is missing or invalid.',
              '',
              'Admin fix if secrets are missing:',
              '',
              '- Add `VERCEL_TOKEN` as a GitHub Actions secret.',
              '- Add `VERCEL_ORG_ID` as a GitHub Actions secret or variable.',
              '- Add `VERCEL_PROJECT_ID` as a GitHub Actions secret or variable.',
              '- Add `VERCEL_PROTECTION_BYPASS` as a GitHub Actions secret if Vercel deployment protection is enabled.',
              '',
              'No secret values are included.'
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Vercel production deploy bridge needs review',
              body,
              labels: ['ai-in-action', 'vercel', 'deployment', 'needs-review']
            });
