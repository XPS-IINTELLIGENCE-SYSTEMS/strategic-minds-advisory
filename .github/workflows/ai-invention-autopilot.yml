name: AI Invention Autopilot

on:
  workflow_dispatch:
    inputs:
      theme:
        description: 'Optional invention theme, e.g. AI wealth education, local business automation, media studio'
        required: false
        default: 'AI in Action educational systems'
      count:
        description: 'Number of safe sandbox ideas to generate, max 3'
        required: false
        default: '1'
  schedule:
    - cron: '41 13 * * *'

permissions:
  contents: write
  actions: write
  issues: write

jobs:
  autopilot:
    name: Generate safe invention ideas and queue sandbox intake
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      THEME: ${{ github.event.inputs.theme || 'AI in Action educational systems' }}
      COUNT: ${{ github.event.inputs.count || '1' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clamp count and prepare folder
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          COUNT_NUM="$COUNT"
          if ! echo "$COUNT_NUM" | grep -Eq '^[0-9]+$'; then COUNT_NUM=1; fi
          if [ "$COUNT_NUM" -lt 1 ]; then COUNT_NUM=1; fi
          if [ "$COUNT_NUM" -gt 3 ]; then COUNT_NUM=3; fi
          echo "count=$COUNT_NUM" >> "$GITHUB_OUTPUT"
          mkdir -p .ai-ops/inventions

      - name: Generate deterministic safe invention requests
        id: generate
        shell: bash
        run: |
          set -euo pipefail
          NOW=$(date -u +%Y%m%dT%H%M%SZ)
          CREATED=()

          for i in $(seq 1 "${{ steps.prep.outputs.count }}"); do
            case "$i" in
              1)
                NAME="AI Skill Drill Coach"
                PROMPT="Create a sandbox system that teaches users a high-value skill through short AI demonstrations, quizzes, source-backed examples, progress tracking, and a proof dashboard. It must include a frontend learning panel, backend status route, Supabase progress tables if needed, and validation proof."
                ;;
              2)
                NAME="AI Business Idea Validator"
                PROMPT="Create a sandbox system that takes a plain-English business idea, scores it against demand, difficulty, cost, proof sources, risks, and next actions. It must include a frontend scorecard, backend validation route, Supabase request/run/proof records, and a report artifact."
                ;;
              3)
                NAME="AI Content Experiment Studio"
                PROMPT="Create a sandbox system that turns an educational topic into short-form content experiments with title hooks, script outlines, risk disclaimers, approval gates, and proof records. It must include a frontend studio panel, backend status route, Supabase records if needed, and validation proof."
                ;;
            esac

            SLUG=$(echo "$NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g')
            FILE=".ai-ops/inventions/${NOW}-${SLUG}.json"
            cat > "$FILE" <<JSON
          {
            "system_name": "$NAME",
            "target_mode": "sandbox",
            "theme": "$THEME",
            "build_prompt": "$PROMPT",
            "autogenerated": true,
            "safety_mode": "controlled_sandbox_only",
            "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON
            CREATED+=("$FILE")
          done

          printf '%s\n' "${CREATED[@]}" > generated_invention_files.txt
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          cat generated_invention_files.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Commit invention requests
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .ai-ops/inventions/*.json
          if git diff --cached --quiet; then
            echo "No invention request files to commit."
            exit 0
          fi
          git commit -m "Queue autonomous AI invention sandbox requests"
          git push

      - name: Create autopilot visibility issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const theme = process.env.THEME || 'AI in Action educational systems';
            const body = [
              '# AI Invention Autopilot Report',
              '',
              `Theme: ${theme}`,
              `Count requested: ${process.env.COUNT || '1'}`,
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              '## What happened',
              '',
              'The autopilot generated safe, controlled sandbox invention request files under `.ai-ops/inventions/`.',
              'Those files trigger the AI Invention Intake workflow, which creates structured sandbox issues and dispatches validation.',
              '',
              '## Safety limits',
              '',
              '- Sandbox only.',
              '- No public publishing.',
              '- No paid API activation.',
              '- No real-money trading.',
              '- No destructive database action.',
              '- No new repo creation without explicit approval.',
              '',
              'No secret values are included.'
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'AI invention autopilot queued sandbox ideas',
              body,
              labels: ['ai-in-action', 'invention-factory', 'autopilot', 'sandbox']
            });
