name: Supabase Database Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/supabase-migrations.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  migrate:
    name: Push Supabase migrations
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secrets
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || (echo "Missing SUPABASE_ACCESS_TOKEN" && exit 1)
          test -n "$SUPABASE_DB_PASSWORD" || (echo "Missing SUPABASE_DB_PASSWORD" && exit 1)
          test -n "$SUPABASE_PROJECT_ID" || (echo "Missing SUPABASE_PROJECT_ID" && exit 1)
          echo "Required Supabase secret names are present. Values are masked by GitHub."

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          supabase link \
            --project-ref "$SUPABASE_PROJECT_ID" \
            --password "$SUPABASE_DB_PASSWORD" \
            --yes

      - name: Repair migration history if schema is missing
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          echo "Checking whether expected AI in Action schema exists before push."
          supabase db dump --schema public > prepush_public_schema.sql

          if grep -Fq 'ai_labs' prepush_public_schema.sql; then
            echo "Expected schema is present. No migration-history repair needed."
            exit 0
          fi

          echo "Expected AI in Action schema is missing while migration history may be marked applied."
          echo "Running guarded repair for allowlisted local migration versions only."

          MIGRATION_VERSIONS=(
            202604240001
            202604240002
            202604250001
            202604250002
          )

          for version in "${MIGRATION_VERSIONS[@]}"; do
            if [ -f "supabase/migrations/${version}_"*.sql ]; then
              echo "Marking migration $version as reverted in remote migration history if present."
              supabase migration repair "$version" --status reverted --password "$SUPABASE_DB_PASSWORD" || true
            else
              echo "ERROR: Expected local migration version $version not found. Refusing repair."
              exit 1
            fi
          done

          echo "Guarded migration-history repair completed. Local migrations will be pushed next."

      - name: Preview pending migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --dry-run

      - name: Push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --yes

      - name: Verify required tables exist
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          set -euo pipefail
          echo "Dumping remote public schema through Supabase CLI for verification."
          supabase db dump --schema public > remote_public_schema.sql

          echo "Generating remote TypeScript database types as a second verification source."
          supabase gen types typescript --linked --schema public > remote_public_types.ts || true

          echo "Schema dump byte count: $(wc -c < remote_public_schema.sql)"
          echo "Generated types byte count: $(wc -c < remote_public_types.ts 2>/dev/null || echo 0)"

          REQUIRED_TABLES=(
            paper_portfolio_snapshots
            paper_trades
            asset_price_checks
            content_packages
            source_links
            platform_logs
            ai_labs
            ai_schedules
            ai_schedule_runs
            ai_runs
            ai_source_receipts
            ai_strategy_simulations
            ai_interest_topics
            ai_avatar_personas
            ai_media_jobs
            ai_approval_queue
            ai_risk_flags
            ai_system_state
            ai_memory_snapshots
            ai_decision_log
            ai_blockers
            ai_repo_registry
            ai_agent_registry
            ai_agent_runs
            ai_tool_registry
            ai_tool_evaluations
            ai_discovery_runs
            ai_trend_signals
            ai_lab_lifecycle
            ai_validation_checks
            ai_notifications
            ai_admin_reviews
          )

          MISSING=()
          for table in "${REQUIRED_TABLES[@]}"; do
            if grep -Fq "$table" remote_public_schema.sql || grep -Fq "$table" remote_public_types.ts; then
              echo "OK $table"
            else
              echo "MISSING $table"
              MISSING+=("$table")
            fi
          done

          if [ "${#MISSING[@]}" -gt 0 ]; then
            echo "ERROR: Missing required tables: ${MISSING[*]}"
            echo "Schema dump preview follows for debugging."
            head -n 80 remote_public_schema.sql || true
            echo "Generated types preview follows for debugging."
            head -n 80 remote_public_types.ts || true
            echo "Check docs/SUPABASE_MIGRATION_ADMIN_RUNBOOK.md for repair steps."
            exit 1
          fi

          echo "All ${#REQUIRED_TABLES[@]} required tables verified successfully."
