name: Supabase Database Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/supabase-migrations.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  migrate:
    name: Push Supabase migrations
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Validate required secrets
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || (echo "Missing SUPABASE_ACCESS_TOKEN" && exit 1)
          test -n "$SUPABASE_DB_PASSWORD" || (echo "Missing SUPABASE_DB_PASSWORD" && exit 1)
          test -n "$SUPABASE_PROJECT_ID" || (echo "Missing SUPABASE_PROJECT_ID" && exit 1)
          echo "Required Supabase secret names are present. Values are masked by GitHub."

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          supabase link \
            --project-ref "$SUPABASE_PROJECT_ID" \
            --password "$SUPABASE_DB_PASSWORD" \
            --yes

      - name: Preview pending migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --dry-run

      - name: Push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --yes

      - name: Verify required tables exist
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          DB_HOST="db.${SUPABASE_PROJECT_ID}.supabase.co"
          DB_IPV4=$(getent ahostsv4 "$DB_HOST" | awk '{ print $1; exit }')
          if [ -z "$DB_IPV4" ]; then
            echo "ERROR: Could not resolve IPv4 address for $DB_HOST"
            exit 1
          fi
          echo "Resolved Supabase database host to IPv4 address for verification."

          REQUIRED_TABLES=(
            paper_portfolio_snapshots
            paper_trades
            asset_price_checks
            content_packages
            source_links
            platform_logs
            ai_labs
            ai_schedules
            ai_schedule_runs
            ai_runs
            ai_source_receipts
            ai_strategy_simulations
            ai_interest_topics
            ai_avatar_personas
            ai_media_jobs
            ai_approval_queue
            ai_risk_flags
            ai_system_state
            ai_memory_snapshots
            ai_decision_log
            ai_blockers
            ai_repo_registry
            ai_agent_registry
            ai_agent_runs
            ai_tool_registry
            ai_tool_evaluations
            ai_discovery_runs
            ai_trend_signals
            ai_lab_lifecycle
            ai_validation_checks
            ai_notifications
            ai_admin_reviews
          )

          MISSING=()
          for table in "${REQUIRED_TABLES[@]}"; do
            EXISTS=$(psql \
              "host=$DB_HOST hostaddr=$DB_IPV4 port=5432 user=postgres dbname=postgres sslmode=require" \
              --tuples-only \
              --no-align \
              --command "select exists (select 1 from information_schema.tables where table_schema = 'public' and table_name = '$table');")
            if [ "$EXISTS" = "t" ]; then
              echo "OK $table"
            else
              echo "MISSING $table"
              MISSING+=("$table")
            fi
          done

          if [ "${#MISSING[@]}" -gt 0 ]; then
            echo "ERROR: Missing required tables: ${MISSING[*]}"
            echo "Check docs/SUPABASE_MIGRATION_ADMIN_RUNBOOK.md for repair steps."
            exit 1
          fi

          echo "All ${#REQUIRED_TABLES[@]} required tables verified successfully."
