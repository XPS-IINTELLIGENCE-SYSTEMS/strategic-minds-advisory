name: AI in Action Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: read
  issues: write

jobs:
  health:
    name: Check deployed AI in Action runtime
    runs-on: ubuntu-latest
    env:
      AI_IN_ACTION_BASE_URL: ${{ secrets.AI_IN_ACTION_BASE_URL || 'https://strategicmindsadvisory.com' }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Resolve proof URL
        run: |
          test -n "$AI_IN_ACTION_BASE_URL" || (echo "Missing AI_IN_ACTION_BASE_URL and no default proof URL was available" && exit 1)
          echo "Using proof URL: $AI_IN_ACTION_BASE_URL"

      - name: Check health endpoint
        run: |
          set -euo pipefail
          curl -fsS "$AI_IN_ACTION_BASE_URL/api/health" | tee health.json
          grep -E '"status"|"connectors"|"mode"' health.json || true

      - name: Trigger platform health cron
        run: |
          set -euo pipefail
          if [ -n "${CRON_SECRET:-}" ]; then
            curl -fsS -H "Authorization: Bearer $CRON_SECRET" "$AI_IN_ACTION_BASE_URL/api/cron/platform-health" | tee platform-health.json
          else
            curl -fsS "$AI_IN_ACTION_BASE_URL/api/cron/platform-health" | tee platform-health.json
          fi

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const baseUrl = process.env.AI_IN_ACTION_BASE_URL || 'https://strategicmindsadvisory.com';
            const title = 'AI in Action health check failed';
            const body = [
              '# AI in Action health check failed',
              '',
              'The scheduled health check could not verify the deployed runtime.',
              '',
              `Proof URL checked: ${baseUrl}`,
              '',
              '## Required check',
              '',
              '- Confirm the Strategic Minds Advisory domain points to the latest Vercel deployment.',
              '- Confirm `/api/health` is reachable.',
              '- Confirm `/api/cron/platform-health` is reachable.',
              '- If using a different proof URL later, set `AI_IN_ACTION_BASE_URL` in GitHub Actions secrets.',
              '- Confirm `CRON_SECRET` matches Vercel if route protection is enabled.',
              '',
              'No secret values were printed by this workflow.'
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ai-in-action', 'blocked', 'needs-validation', 'github-actions']
            });
