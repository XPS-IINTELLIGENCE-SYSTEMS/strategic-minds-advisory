name: AI Ops Command Dispatcher

on:
  push:
    branches:
      - main
    paths:
      - '.ai-ops/commands/**.json'
  workflow_dispatch:
    inputs:
      command:
        description: 'Allowed command: run-supabase-migrations, run-health-check, run-cron-failover'
        required: true
        default: 'run-health-check'
      route:
        description: 'Optional route for cron failover: platform-health, market-check, daily-summary, content-package, all'
        required: false
        default: 'platform-health'

permissions:
  contents: read
  actions: write
  issues: write

jobs:
  dispatch:
    name: Dispatch allowlisted AI ops command
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Resolve command
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          COMMAND="${{ github.event.inputs.command || '' }}"
          ROUTE="${{ github.event.inputs.route || 'platform-health' }}"

          if [ -z "$COMMAND" ]; then
            FILE=$(git diff --name-only HEAD~1 HEAD -- '.ai-ops/commands/**.json' | tail -n 1 || true)
            if [ -z "$FILE" ]; then
              echo "No command file found."
              exit 1
            fi
            echo "Reading command from $FILE"
            COMMAND=$(jq -r '.command // empty' "$FILE")
            ROUTE=$(jq -r '.route // "platform-health"' "$FILE")
          fi

          case "$COMMAND" in
            run-supabase-migrations)
              WORKFLOW_FILE="supabase-migrations.yml"
              WORKFLOW_NAME="Supabase Database Migrations"
              ;;
            run-health-check)
              WORKFLOW_FILE="ai-in-action-health-check.yml"
              WORKFLOW_NAME="AI in Action Health Check"
              ;;
            run-cron-failover)
              WORKFLOW_FILE="ai-in-action-cron-failover.yml"
              WORKFLOW_NAME="AI in Action Cron Failover"
              ;;
            *)
              echo "Unsupported command: $COMMAND"
              exit 1
              ;;
          esac

          echo "command=$COMMAND" >> "$GITHUB_OUTPUT"
          echo "route=$ROUTE" >> "$GITHUB_OUTPUT"
          echo "workflow_file=$WORKFLOW_FILE" >> "$GITHUB_OUTPUT"
          echo "workflow_name=$WORKFLOW_NAME" >> "$GITHUB_OUTPUT"
          echo "Allowed command: $COMMAND"
          echo "Target workflow: $WORKFLOW_FILE"

      - name: Dispatch target workflow
        id: dispatch
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_FILE: ${{ steps.resolve.outputs.workflow_file }}
          COMMAND: ${{ steps.resolve.outputs.command }}
          ROUTE: ${{ steps.resolve.outputs.route }}
        shell: bash
        run: |
          set -euo pipefail
          BEFORE=$(gh run list --workflow "$WORKFLOW_FILE" --branch main --limit 1 --json databaseId --jq '.[0].databaseId // ""' || true)
          echo "Previous latest run id: ${BEFORE:-none}"

          if [ "$COMMAND" = "run-cron-failover" ]; then
            gh workflow run "$WORKFLOW_FILE" --ref main -f route="$ROUTE"
          else
            gh workflow run "$WORKFLOW_FILE" --ref main
          fi

          echo "before=$BEFORE" >> "$GITHUB_OUTPUT"
          echo "Dispatched $WORKFLOW_FILE"

      - name: Wait for target workflow to appear
        id: target
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_FILE: ${{ steps.resolve.outputs.workflow_file }}
          BEFORE: ${{ steps.dispatch.outputs.before }}
        shell: bash
        run: |
          set -euo pipefail
          RUN_ID=""
          RUN_URL=""
          for i in $(seq 1 24); do
            LATEST=$(gh run list --workflow "$WORKFLOW_FILE" --branch main --limit 5 --json databaseId,url,status,conclusion,createdAt --jq '.[0]')
            ID=$(echo "$LATEST" | jq -r '.databaseId // empty')
            URL=$(echo "$LATEST" | jq -r '.url // empty')
            if [ -n "$ID" ] && [ "$ID" != "$BEFORE" ]; then
              RUN_ID="$ID"
              RUN_URL="$URL"
              break
            fi
            echo "Waiting for target workflow run to appear... attempt $i"
            sleep 5
          done

          if [ -z "$RUN_ID" ]; then
            echo "target_found=false" >> "$GITHUB_OUTPUT"
            echo "run_id=" >> "$GITHUB_OUTPUT"
            echo "run_url=" >> "$GITHUB_OUTPUT"
            echo "Target workflow run did not appear within polling window."
            exit 0
          fi

          echo "target_found=true" >> "$GITHUB_OUTPUT"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "run_url=$RUN_URL" >> "$GITHUB_OUTPUT"
          echo "Target run id: $RUN_ID"
          echo "Target run url: $RUN_URL"

      - name: Wait for target workflow completion
        id: result
        if: steps.target.outputs.target_found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.target.outputs.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          STATUS="unknown"
          CONCLUSION="unknown"
          JOB_SUMMARY=""
          for i in $(seq 1 60); do
            DATA=$(gh run view "$RUN_ID" --json status,conclusion,url,jobs)
            STATUS=$(echo "$DATA" | jq -r '.status // "unknown"')
            CONCLUSION=$(echo "$DATA" | jq -r '.conclusion // ""')
            echo "Target run status: $STATUS conclusion: ${CONCLUSION:-pending}"
            if [ "$STATUS" = "completed" ]; then
              JOB_SUMMARY=$(echo "$DATA" | jq -r '.jobs[]? | "- " + .name + ": " + (.conclusion // .status // "unknown")' | head -n 20)
              break
            fi
            sleep 10
          done

          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "conclusion=${CONCLUSION:-pending}" >> "$GITHUB_OUTPUT"
          {
            echo 'job_summary<<EOF'
            echo "$JOB_SUMMARY"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create visibility audit issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const command = '${{ steps.resolve.outputs.command }}';
            const route = '${{ steps.resolve.outputs.route }}';
            const workflowFile = '${{ steps.resolve.outputs.workflow_file }}';
            const workflowName = '${{ steps.resolve.outputs.workflow_name }}';
            const dispatcherStatus = '${{ job.status }}';
            const targetFound = '${{ steps.target.outputs.target_found }}';
            const runId = '${{ steps.target.outputs.run_id }}';
            const runUrl = '${{ steps.target.outputs.run_url }}';
            const targetStatus = '${{ steps.result.outputs.status }}';
            const targetConclusion = '${{ steps.result.outputs.conclusion }}';
            const jobSummary = `${{ steps.result.outputs.job_summary }}`;
            const needsAdmin = targetFound !== 'true' || (targetConclusion && !['success', ''].includes(targetConclusion));
            const title = needsAdmin
              ? `AI ops visibility: ${command || 'unknown'} needs review`
              : `AI ops visibility: ${command || 'unknown'} completed`;
            const body = [
              '# AI Ops Visibility Report',
              '',
              `Command: ${command || 'unknown'}`,
              `Route: ${route || 'not applicable'}`,
              `Target workflow: ${workflowName || workflowFile}`,
              `Workflow file: ${workflowFile}`,
              `Dispatcher status: ${dispatcherStatus}`,
              `Target run found: ${targetFound || 'unknown'}`,
              `Target run id: ${runId || 'unavailable'}`,
              `Target status: ${targetStatus || 'unavailable'}`,
              `Target conclusion: ${targetConclusion || 'unavailable'}`,
              runUrl ? `Target run URL: ${runUrl}` : 'Target run URL: unavailable',
              '',
              '## Job summary',
              '',
              jobSummary || 'No job summary available from GitHub CLI.',
              '',
              '## Next action',
              '',
              needsAdmin
                ? 'Review the target workflow run URL or provide the latest failed step log. No secret values are included in this report.'
                : 'No admin action required unless downstream validation finds missing tables or runtime config.',
              '',
              `Dispatcher commit: ${context.sha}`,
              '',
              'No secret values were included in this issue.'
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: needsAdmin ? ['ai-in-action', 'github-actions', 'needs-validation', 'human-input-needed'] : ['ai-in-action', 'github-actions']
            });
